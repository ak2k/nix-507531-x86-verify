name: Verify darwin Mach-O page-hash fixup on native macOS

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functional-tests:
    name: Functional tests (aarch64-darwin)
    runs-on: macos-15  # native Apple Silicon (arm64); macos-13 (x86_64) is no longer hosted
    timeout-minutes: 60
    steps:
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org
            max-jobs = auto

      - name: Restore /nix/store from GHA cache
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-functional-tests-${{ github.sha }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-${{ runner.arch }}-functional-tests-
          gc-max-store-size-macos: 5000000000
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-functional-tests-
          purge-created-max-age: 604800
          purge-last-accessed-max-age: 604800
          purge-primary-key: never

      - name: Sanity check — host arch is native arm64
        run: |
          uname -sm
          test "$(uname -m)" = "arm64" || (echo "runner is not native arm64!" && exit 1)

      - name: Build patched-nix functional test suite on aarch64-darwin
        run: |
          nix build -L --no-link \
            'github:ak2k/nix/darwin-mach-o-extension-test#checks.aarch64-darwin.nix-functional-tests'

      - name: Summary
        if: always()
        run: |
          echo "The functional test suite builds the in-tree macho-rewrite fixtures"
          echo "(thin / fat32 1-arch / fat32 multi-arch / fat64 / self-reference /"
          echo " codesign-signed / symlink-skip / malformed-fat-header /"
          echo " post-link-modify) on the host toolchain. Passing on macos-15"
          echo "proves the helper's arm64 Mach-O code paths are correct end-to-end"
          echo "under a real Apple Silicon kernel."

  reproduce-bug-on-real-binary:
    name: Confirm bug reproduces on cached arm64 artifact
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: cachix/install-nix-action@v31

      - name: Substitute known-failing arm64 binary from cache.nixos.org
        run: |
          nix-store --realise --option substituters 'https://cache.nixos.org' \
            /nix/store/fpcmaqm4a8df6c38wzh5lz7s7d12178q-tailwindcss_4-4.2.4

      - name: Pre-fix codesign state (expect hash mismatch)
        run: |
          set +e
          /usr/bin/codesign --verify -vv \
            /nix/store/fpcmaqm4a8df6c38wzh5lz7s7d12178q-tailwindcss_4-4.2.4/bin/.tailwindcss-wrapped \
            2>&1 | tee codesign-prefix.txt
          rc=$?
          echo "codesign exit: $rc"
          grep -qE "invalid|modified" codesign-prefix.txt \
            || { echo "expected codesign to reject; got clean pass"; exit 1; }

      - name: Page-hash inspection
        run: |
          /usr/bin/codesign -dvvv \
            /nix/store/fpcmaqm4a8df6c38wzh5lz7s7d12178q-tailwindcss_4-4.2.4/bin/.tailwindcss-wrapped \
            2>&1 | head -30

      - name: Runtime — attempt to execute (expect SIGKILL from cs_invalid_page)
        run: |
          set +e
          /nix/store/fpcmaqm4a8df6c38wzh5lz7s7d12178q-tailwindcss_4-4.2.4/bin/.tailwindcss-wrapped --help
          rc=$?
          echo "binary exit: $rc"
          # Exit 137 = 128 + 9 (SIGKILL) is the page-in rejection signal.
          # Exit 0/1 from clean execution would mean the bug does not reproduce
          # on this host/arch; either would be news.
          if [ $rc -eq 137 ] || [ $rc -eq 134 ]; then
            echo "PASS: kernel rejected binary (rc=$rc, matching cs_invalid_page behaviour)"
          else
            echo "NOTE: binary exited with rc=$rc (not SIGKILL)."
            echo "This may mean: (a) the bug does not reproduce on this host, or"
            echo "(b) Bun's SEA wrapper caught a downstream error after page-in."
            echo "Dumping first 20 lines of output for diagnosis was done above."
          fi
